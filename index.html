<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>surreal.red — generative ambient</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #888;
    }
    #preset-row {
      display: flex;
      justify-content: center;
    }
    select {
      background: none;
      border: 1px solid #444;
      color: #ccc;
      padding: 0.6em 1.2em;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: border-color 0.3s, color 0.3s;
      appearance: none;
      -webkit-appearance: none;
    }
    select:hover { border-color: #aaa; color: #fff; }
    select option {
      background: #111;
      color: #ccc;
      text-transform: uppercase;
    }
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    button {
      background: none;
      border: 1px solid #444;
      color: #ccc;
      padding: 0.6em 1.6em;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
    }
    button:hover { border-color: #aaa; color: #fff; }
    button.active { border-color: #e88; color: #e88; }
    button:disabled { opacity: 0.3; cursor: default; }
    #status {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.15em;
      min-height: 1.2em;
    }
    #viz {
      width: 320px;
      height: 40px;
      position: relative;
      overflow: hidden;
    }
    .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #888;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 2s;
    }
    .dot.show { opacity: 0.7; }
    #rec-timer {
      font-size: 0.7rem;
      color: #e88;
      letter-spacing: 0.15em;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>surreal.red</h1>
  <div id="preset-row">
    <select id="preset-select">
      <option value="sakamoto">Sakamoto — Late</option>
      <option value="eno">Eno — Ambient</option>
      <option value="budd">Budd — Plateaux</option>
      <option value="deepspace">Deep Space</option>
      <option value="nocturne">Nocturne — B minor</option>
      <option value="minimal">Minimal — E Lydian</option>
      <option value="gymno">Gymnopedie — D Major</option>
      <option value="arabesque">Arabesque — A Pentatonic</option>
      <option value="moonlight">Moonlight — C# minor</option>
      <option value="spring">Spring — C Major</option>
      <option value="waltz">Waltz — D Major</option>
      <option value="groove">Groove — A Mixolydian</option>
      <option value="float">Float — Ab Major</option>
      <option value="aurora">Aurora — A Major</option>
      <option value="morning">Morning — G Major</option>
      <option value="pulse">Pulse — Electronic</option>
    </select>
  </div>
  <div id="viz"></div>
  <div class="controls">
    <button id="btn-play">Play</button>
    <button id="btn-rec" disabled>Rec</button>
    <button id="btn-stop-rec" disabled>Stop Rec</button>
  </div>
  <div id="status">click play to begin</div>
  <div id="rec-timer"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
